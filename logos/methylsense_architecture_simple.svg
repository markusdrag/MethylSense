  <rect x="210" y="20" width="240" height="240" rx="0" fill="none" stroke="#333" stroke-width="2"/>
  <text x="330" y="40" font-family="Times New Roman, serif" font-size="12" font-weight="bold" text-anchor="middle" fill="#333">MethylSense Pipeline</text>
  
  <!-- Scripts -->
  <rect x="225" y="55" width="100" height="40" rx="0" fill="none" stroke="#333" stroke-width="1"/>
  <text x="275" y="72" font-family="Times New Roman, serif" font-size="10" text-anchor="middle" fill="#333">load_data.R</text>
  <text x="275" y="86" font-family="Times New Roman, serif" font-size="8" font-style="italic" text-anchor="middle" fill="#666">preprocessing</text>
  
  <rect x="335" y="55" width="100" height="40" rx="0" fill="none" stroke="#333" stroke-width="1"/>
  <text x="385" y="72" font-family="Times New Roman, serif" font-size="10" text-anchor="middle" fill="#333">analysis.R</text>
  <text x="385" y="86" font-family="Times New Roman, serif" font-size="8" font-style="italic" text-anchor="middle" fill="#666">DMR + ML</text>
  
  <rect x="225" y="105" width="100" height="40" rx="0" fill="none" stroke="#333" stroke-width="1"/>
  <text x="275" y="122" font-family="Times New Roman, serif" font-size="10" text-anchor="middle" fill="#333">reviewer.R</text>
  <text x="275" y="136" font-family="Times New Roman, serif" font-size="8" font-style="italic" text-anchor="middle" fill="#666">evaluation</text>
  
  <rect x="335" y="105" width="100" height="40" rx="0" fill="none" stroke="#333" stroke-width="1"/>
  <text x="385" y="122" font-family="Times New Roman, serif" font-size="10" text-anchor="middle" fill="#333">predict.R</text>
  <text x="385" y="136" font-family="Times New Roman, serif" font-size="8" font-style="italic" text-anchor="middle" fill="#666">classification</text>
  
  <!-- Core functions -->
  <rect x="225" y="160" width="210" height="90" rx="0" fill="none" stroke="#666" stroke-width="1" stroke-dasharray="3,2"/>
  <text x="330" y="178" font-family="Times New Roman, serif" font-size="10" font-style="italic" text-anchor="middle" fill="#666">Core Components</text>
  
  <text x="270" y="200" font-family="Times New Roman, serif" font-size="9" text-anchor="middle" fill="#333">methylKit</text>
  <text x="270" y="212" font-family="Times New Roman, serif" font-size="8" font-style="italic" text-anchor="middle" fill="#666">DMR detection</text>
  
  <text x="390" y="200" font-family="Times New Roman, serif" font-size="9" text-anchor="middle" fill="#333">caret</text>
