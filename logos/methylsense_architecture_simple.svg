  </defs>
  
  <!-- Background -->
  <rect width="650" height="280" fill="#ffffff"/>
  
  <!-- INPUT SECTION -->
  <rect x="20" y="20" width="150" height="240" rx="0" fill="none" stroke="#333" stroke-width="1" stroke-dasharray="5,3"/>
  <text x="95" y="40" font-family="Times New Roman, serif" font-size="12" font-weight="bold" text-anchor="middle" fill="#333">Input</text>
  
  <rect x="35" y="55" width="120" height="35" rx="0" fill="none" stroke="#333" stroke-width="1"/>
  <text x="95" y="77" font-family="Times New Roman, serif" font-size="10" text-anchor="middle" fill="#333">.CpG.bed files</text>
  
  <rect x="35" y="100" width="120" height="35" rx="0" fill="none" stroke="#333" stroke-width="1"/>
  <text x="95" y="122" font-family="Times New Roman, serif" font-size="10" text-anchor="middle" fill="#333">Sample Sheet</text>
  
  <rect x="35" y="145" width="120" height="35" rx="0" fill="none" stroke="#333" stroke-width="1"/>
  <text x="95" y="167" font-family="Times New Roman, serif" font-size="10" text-anchor="middle" fill="#333">Window BED</text>
  
  <rect x="35" y="190" width="120" height="35" rx="0" fill="none" stroke="#333" stroke-width="1"/>
  <text x="95" y="212" font-family="Times New Roman, serif" font-size="10" text-anchor="middle" fill="#333">New Samples</text>
  
  <!-- Arrow to pipeline -->
  <line x1="170" y1="140" x2="205" y2="140" stroke="#333" stroke-width="1.5" marker-end="url(#arrow)"/>
  
