  <text x="560" y="40" font-family="Times New Roman, serif" font-size="12" font-weight="bold" text-anchor="middle" fill="#333">Output</text>
  
  <rect x="505" y="55" width="110" height="35" rx="0" fill="none" stroke="#333" stroke-width="1"/>
  <text x="560" y="77" font-family="Times New Roman, serif" font-size="10" text-anchor="middle" fill="#333">Reports</text>
  
  <rect x="505" y="100" width="110" height="35" rx="0" fill="none" stroke="#333" stroke-width="1"/>
  <text x="560" y="122" font-family="Times New Roman, serif" font-size="10" text-anchor="middle" fill="#333">Trained Models</text>
  
  <rect x="505" y="145" width="110" height="35" rx="0" fill="none" stroke="#333" stroke-width="1"/>
  <text x="560" y="167" font-family="Times New Roman, serif" font-size="10" text-anchor="middle" fill="#333">Figures</text>
  
  <rect x="505" y="190" width="110" height="35" rx="0" fill="none" stroke="#333" stroke-width="1"/>
  <text x="560" y="212" font-family="Times New Roman, serif" font-size="10" text-anchor="middle" fill="#333">Predictions</text>
