<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 880 180">
  <defs>
    <marker id="arrow" markerWidth="8" markerHeight="8" refX="7" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L8,3 z" fill="#6c757d"/>
    </marker>
  </defs>
  
  <!-- Background -->
  <rect width="880" height="180" fill="#ffffff"/>
  
  <!-- Title -->
  <text x="440" y="22" font-family="Helvetica, Arial, sans-serif" font-size="14" font-weight="bold" text-anchor="middle" fill="#2c3e50">MethylSense Pipeline</text>
  
  <!-- Upstream Section -->
  <rect x="15" y="40" width="145" height="125" rx="6" fill="#f8f9fa" stroke="#dee2e6" stroke-width="1"/>
  <text x="87" y="58" font-family="Helvetica, Arial, sans-serif" font-size="10" font-weight="bold" text-anchor="middle" fill="#6c757d">UPSTREAM</text>
  
  <rect x="25" y="68" width="125" height="28" rx="4" fill="#3498db"/>
  <text x="87" y="86" font-family="Helvetica, Arial, sans-serif" font-size="9" text-anchor="middle" fill="white">Nanopore Sequencing</text>
  
  <rect x="25" y="102" width="125" height="28" rx="4" fill="white" stroke="#3498db" stroke-width="1"/>
  <text x="87" y="120" font-family="Helvetica, Arial, sans-serif" font-size="8" text-anchor="middle" fill="#3498db">NanoporeToBED-Pipeline</text>
  
  <rect x="25" y="135" width="125" height="22" rx="4" fill="white" stroke="#27ae60" stroke-width="1"/>
  <text x="87" y="150" font-family="Helvetica, Arial, sans-serif" font-size="8" text-anchor="middle" fill="#27ae60">GenomeToWindows</text>
  
  <!-- Arrow to Step 1 -->
  <path d="M 165 95 L 185 95" stroke="#6c757d" stroke-width="2" fill="none" marker-end="url(#arrow)"/>
  
  <!-- Step 1 -->
  <rect x="190" y="50" width="115" height="95" rx="5" fill="#27ae60"/>
  <text x="247" y="72" font-family="Helvetica, Arial, sans-serif" font-size="10" font-weight="bold" text-anchor="middle" fill="white">STEP 1</text>
  <text x="247" y="88" font-family="Helvetica, Arial, sans-serif" font-size="11" text-anchor="middle" fill="white">Load Data</text>
  <line x1="200" y1="96" x2="295" y2="96" stroke="rgba(255,255,255,0.4)" stroke-width="1"/>
  <text x="247" y="112" font-family="Helvetica, Arial, sans-serif" font-size="8" text-anchor="middle" fill="rgba(255,255,255,0.9)">Preprocess .CpG.bed</text>
  <text x="247" y="125" font-family="Helvetica, Arial, sans-serif" font-size="8" text-anchor="middle" fill="rgba(255,255,255,0.9)">Output: .qs file</text>
  <text x="247" y="140" font-family="Helvetica, Arial, sans-serif" font-size="8" text-anchor="middle" fill="rgba(255,255,255,0.7)">5-10 min</text>
  
  <!-- Arrow to Step 2 -->
  <path d="M 310 95 L 330 95" stroke="#6c757d" stroke-width="2" fill="none" marker-end="url(#arrow)"/>
  
  <!-- Step 2 -->
  <rect x="335" y="50" width="115" height="95" rx="5" fill="#27ae60"/>
  <text x="392" y="72" font-family="Helvetica, Arial, sans-serif" font-size="10" font-weight="bold" text-anchor="middle" fill="white">STEP 2</text>
  <text x="392" y="88" font-family="Helvetica, Arial, sans-serif" font-size="11" text-anchor="middle" fill="white">Train Models</text>
  <line x1="345" y1="96" x2="440" y2="96" stroke="rgba(255,255,255,0.4)" stroke-width="1"/>
  <text x="392" y="112" font-family="Helvetica, Arial, sans-serif" font-size="8" text-anchor="middle" fill="rgba(255,255,255,0.9)">DMR detection</text>
  <text x="392" y="125" font-family="Helvetica, Arial, sans-serif" font-size="8" text-anchor="middle" fill="rgba(255,255,255,0.9)">ML training + CV</text>
  <text x="392" y="140" font-family="Helvetica, Arial, sans-serif" font-size="8" text-anchor="middle" fill="rgba(255,255,255,0.7)">1-2 hours</text>
  
  <!-- Arrow to Step 3 -->
  <path d="M 455 95 L 475 95" stroke="#6c757d" stroke-width="2" fill="none" marker-end="url(#arrow)"/>
  
  <!-- Step 3: Evaluation (was Step 4) -->
  <rect x="480" y="50" width="115" height="95" rx="5" fill="#9b59b6"/>
  <text x="537" y="72" font-family="Helvetica, Arial, sans-serif" font-size="10" font-weight="bold" text-anchor="middle" fill="white">STEP 3</text>
  <text x="537" y="88" font-family="Helvetica, Arial, sans-serif" font-size="11" text-anchor="middle" fill="white">Evaluation</text>
  <line x1="490" y1="96" x2="585" y2="96" stroke="rgba(255,255,255,0.4)" stroke-width="1"/>
  <text x="537" y="112" font-family="Helvetica, Arial, sans-serif" font-size="8" text-anchor="middle" fill="rgba(255,255,255,0.9)">Compare models</text>
  <text x="537" y="125" font-family="Helvetica, Arial, sans-serif" font-size="8" text-anchor="middle" fill="rgba(255,255,255,0.9)">Select best model</text>
  <text x="537" y="140" font-family="Helvetica, Arial, sans-serif" font-size="8" text-anchor="middle" fill="rgba(255,255,255,0.7)">5-10 min</text>
  
  <!-- Arrow to Step 4 -->
  <path d="M 600 95 L 620 95" stroke="#6c757d" stroke-width="2" fill="none" marker-end="url(#arrow)"/>
  
  <!-- Step 4: Diagnosis (was Step 3) -->
  <rect x="625" y="50" width="130" height="95" rx="5" fill="#f39c12"/>
  <text x="690" y="72" font-family="Helvetica, Arial, sans-serif" font-size="10" font-weight="bold" text-anchor="middle" fill="white">STEP 4</text>
  <text x="690" y="88" font-family="Helvetica, Arial, sans-serif" font-size="10" text-anchor="middle" fill="white">Diagnosis</text>
  <line x1="635" y1="96" x2="745" y2="96" stroke="rgba(255,255,255,0.4)" stroke-width="1"/>
  <text x="690" y="112" font-family="Helvetica, Arial, sans-serif" font-size="8" text-anchor="middle" fill="rgba(255,255,255,0.9)">Classify samples</text>
  <text x="690" y="125" font-family="Helvetica, Arial, sans-serif" font-size="8" text-anchor="middle" fill="rgba(255,255,255,0.9)">Confidence scores</text>
  <text x="690" y="140" font-family="Helvetica, Arial, sans-serif" font-size="8" text-anchor="middle" fill="rgba(255,255,255,0.7)">1-2 min</text>
  
  <!-- Arrow to Output -->
  <path d="M 760 95 L 780 95" stroke="#6c757d" stroke-width="2" fill="none" marker-end="url(#arrow)"/>
  
  <!-- Output -->
  <rect x="785" y="65" width="80" height="60" rx="4" fill="white" stroke="#f39c12" stroke-width="1.5"/>
  <text x="825" y="88" font-family="Helvetica, Arial, sans-serif" font-size="9" font-weight="bold" text-anchor="middle" fill="#f39c12">OUTPUT</text>
  <text x="825" y="103" font-family="Helvetica, Arial, sans-serif" font-size="8" text-anchor="middle" fill="#6c757d">Predictions</text>
  <text x="825" y="116" font-family="Helvetica, Arial, sans-serif" font-size="8" text-anchor="middle" fill="#6c757d">Reports</text>
</svg>
