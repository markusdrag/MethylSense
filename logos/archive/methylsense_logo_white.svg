<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="800" height="300" viewBox="0 0 800 300">
  <rect width="800" height="300" fill="#ffffff"/>
  
  <!-- Main text -->
  <text x="400" y="150" 
        font-family="Courier New, monospace" font-size="88" font-weight="bold" 
        fill="#0d7a3d" text-anchor="middle" dominant-baseline="middle"
        >METHYLSENSE</text>
  
  
  
  <!-- 5mC decorations -->
  
        <g transform="translate(125, 95) scale(0.9)">
          <!-- Cytosine ring -->
          <polygon points="0,-14 14,-7 14,7 0,14 -14,7 -14,-7" 
                   fill="rgba(10, 157, 122, 0.1)" stroke="#0a9d7a" stroke-width="2.5"/>
          
          <!-- Double bonds -->
          <line x1="-9.8" y1="-1.4" x2="-9.8" y2="2.8" stroke="#0a9d7a" stroke-width="2"/>
          <line x1="2.8" y1="-9.8" x2="9.8" y2="-3.5" stroke="#0a9d7a" stroke-width="2"/>
          
          <!-- Nitrogens -->
          <text x="16" y="7" font-family="Courier New" font-size="11" font-weight="bold" 
                fill="#0a9d7a" text-anchor="middle" dominant-baseline="middle">N</text>
          <text x="-16" y="7" font-family="Courier New" font-size="11" font-weight="bold" 
                fill="#0a9d7a" text-anchor="middle" dominant-baseline="middle">N</text>
          
          <!-- Amino group with proper bond -->
          <line x1="-14" y1="-7" x2="-24" y2="-7" stroke="#0a9d7a" stroke-width="2.5"/>
          <text x="-32" y="-7" font-family="Courier New" font-size="9" font-weight="bold" 
                fill="#0a9d7a" text-anchor="middle" dominant-baseline="middle">NH₂</text>
          
          <!-- Carbonyl with visible double bond -->
          <line x1="-3" y1="14" x2="-3" y2="22" stroke="#0a9d7a" stroke-width="2.5"/>
          <line x1="3" y1="14" x2="3" y2="22" stroke="#0a9d7a" stroke-width="2.5"/>
          <text x="0" y="30" font-family="Courier New" font-size="10" font-weight="bold" 
                fill="#0a9d7a" text-anchor="middle" dominant-baseline="middle">O</text>
          
          <!-- Methyl group -->
          <line x1="0" y1="-14" x2="0" y2="-24" stroke="#d63447" stroke-width="2.5"/>
          <circle cx="0" cy="-32" r="9" fill="#d63447"/>
          <text x="0" y="-32" font-family="Courier New" font-size="8" font-weight="bold" 
                fill="#ffffff" text-anchor="middle" dominant-baseline="middle">CH₃</text>
        </g>
      
  
